<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message for You</title>
    <style>
        :root {
            --blush: #f8d7df;
            --petal: #f0a9bb;
            --petal-deep: #d97897;
            --cream: #fff8f3;
            --leaf: #6f8f74;
            --leaf-deep: #456150;
            --ink: #5a3241;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 20px;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--ink);
            background-color: #f7e3e6;
            background-image:
                radial-gradient(circle at 15% 18%, rgba(255, 255, 255, 0.7) 0 10%, transparent 11%),
                radial-gradient(circle at 80% 12%, rgba(255, 255, 255, 0.5) 0 9%, transparent 10%),
                radial-gradient(circle at 85% 78%, rgba(255, 255, 255, 0.45) 0 11%, transparent 12%),
                radial-gradient(circle at 20% 82%, rgba(255, 255, 255, 0.55) 0 9%, transparent 10%),
                radial-gradient(circle at 12% 24%, rgba(240, 169, 187, 0.92) 0 6%, rgba(217, 120, 151, 0.82) 7% 12%, transparent 13%),
                radial-gradient(circle at 22% 15%, rgba(240, 169, 187, 0.85) 0 5%, rgba(217, 120, 151, 0.75) 6% 10%, transparent 11%),
                radial-gradient(circle at 18% 10%, rgba(255, 248, 243, 0.95) 0 3%, transparent 4%),
                radial-gradient(circle at 78% 20%, rgba(240, 169, 187, 0.9) 0 6%, rgba(217, 120, 151, 0.76) 7% 12%, transparent 13%),
                radial-gradient(circle at 88% 10%, rgba(240, 169, 187, 0.82) 0 5%, rgba(217, 120, 151, 0.72) 6% 10%, transparent 11%),
                radial-gradient(circle at 82% 14%, rgba(255, 248, 243, 0.95) 0 3%, transparent 4%),
                radial-gradient(circle at 14% 82%, rgba(240, 169, 187, 0.9) 0 6%, rgba(217, 120, 151, 0.74) 7% 12%, transparent 13%),
                radial-gradient(circle at 25% 88%, rgba(240, 169, 187, 0.84) 0 5%, rgba(217, 120, 151, 0.7) 6% 10%, transparent 11%),
                radial-gradient(circle at 19% 86%, rgba(255, 248, 243, 0.95) 0 3%, transparent 4%),
                radial-gradient(circle at 82% 76%, rgba(240, 169, 187, 0.92) 0 6%, rgba(217, 120, 151, 0.82) 7% 12%, transparent 13%),
                radial-gradient(circle at 72% 86%, rgba(240, 169, 187, 0.86) 0 5%, rgba(217, 120, 151, 0.74) 6% 10%, transparent 11%),
                radial-gradient(circle at 78% 82%, rgba(255, 248, 243, 0.95) 0 3%, transparent 4%),
                linear-gradient(125deg, rgba(111, 143, 116, 0.18), transparent 24%),
                linear-gradient(305deg, rgba(69, 97, 80, 0.16), transparent 22%),
                radial-gradient(circle at center, #fdf4f6 0%, var(--blush) 48%, #efc3cf 100%);
            background-attachment: fixed;
            overflow: hidden;
            transition: background 0.7s ease, background-image 0.7s ease;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
        }

        body::before {
            background:
                linear-gradient(130deg, transparent 0 22%, rgba(111, 143, 116, 0.18) 22% 24%, transparent 24% 100%),
                linear-gradient(35deg, transparent 0 76%, rgba(111, 143, 116, 0.16) 76% 78%, transparent 78% 100%),
                linear-gradient(155deg, transparent 0 70%, rgba(69, 97, 80, 0.14) 70% 72%, transparent 72% 100%),
                linear-gradient(330deg, transparent 0 18%, rgba(69, 97, 80, 0.14) 18% 20%, transparent 20% 100%);
            opacity: 0.8;
        }

        body::after {
            background:
                radial-gradient(circle at 17% 18%, rgba(255, 255, 255, 0.35) 0 2%, transparent 3%),
                radial-gradient(circle at 80% 17%, rgba(255, 255, 255, 0.32) 0 2%, transparent 3%),
                radial-gradient(circle at 18% 84%, rgba(255, 255, 255, 0.28) 0 2%, transparent 3%),
                radial-gradient(circle at 82% 79%, rgba(255, 255, 255, 0.3) 0 2%, transparent 3%);
            filter: blur(2px);
        }

        body.revealed {
            background:
                linear-gradient(rgba(28, 18, 22, 0.48), rgba(28, 18, 22, 0.48)),
                url("peony-message-bg.png") center center / cover no-repeat fixed;
        }

        body.revealed::before,
        body.revealed::after {
            opacity: 0;
        }

        .screen {
            width: min(760px, 100%);
            position: relative;
            z-index: 1;
        }

        .panel {
            padding: 40px 32px;
            border-radius: 28px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 24px 60px rgba(90, 50, 65, 0.16);
            backdrop-filter: blur(12px);
            transition: opacity 0.45s ease, transform 0.45s ease;
        }

        .intro {
            background: rgba(255, 248, 243, 0.82);
        }

        .message {
            display: none;
            background: rgba(255, 248, 243, 0.78);
            color: #2f1921;
        }

        .message.visible {
            display: block;
            animation: fadeUp 0.5s ease;
        }

        .hidden {
            opacity: 0;
            transform: translateY(18px);
            pointer-events: none;
        }

        h1 {
            margin: 0 0 18px;
            font-size: clamp(2rem, 4vw, 3rem);
            color: #b44f73;
            letter-spacing: 0.03em;
        }

        p {
            margin: 0;
            font-size: clamp(1.05rem, 2.2vw, 1.35rem);
            line-height: 1.8;
        }

        .lead {
            margin-bottom: 24px;
        }

        button {
            border: 0;
            padding: 14px 28px;
            border-radius: 999px;
            font: inherit;
            font-size: 1rem;
            color: #fff8fb;
            background: linear-gradient(135deg, #d86b94, #b44f73);
            box-shadow: 0 14px 28px rgba(180, 79, 115, 0.28);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 34px rgba(180, 79, 115, 0.34);
        }

        button:active {
            transform: translateY(0);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(18px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 640px) {
            .panel {
                padding: 28px 22px;
                border-radius: 22px;
            }
        }
    </style>
</head>
<body>
<div class="screen">
    <div class="panel intro" id="introPanel">
        <h1>For You</h1>
        <p class="lead">I clickk heheeheheh.</p>
        <button id="showMessageButton" type="button">Open Message</button>
    </div>

    <div class="panel message" id="messagePanel">
        <h1>Message for You</h1>
        <p>
            Hiiii gorjusss ehehehehe Good nightttt, thankssss sa pagg kuyogg nimo ganinaa heeheheh lovelotssss
        </p>
    </div>
</div>

<script>
    const button = document.getElementById("showMessageButton");
    const introPanel = document.getElementById("introPanel");
    const messagePanel = document.getElementById("messagePanel");

    button.addEventListener("click", () => {
        document.body.classList.add("revealed");
        introPanel.classList.add("hidden");

        window.setTimeout(() => {
            introPanel.style.display = "none";
            messagePanel.classList.add("visible");
        }, 350);
    });
</script>
</body>
</html>
